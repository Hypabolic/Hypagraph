name: Apply M5A closeout documentation

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/m5a-closeout'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Update M5A status and indexes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          trusted = Path('docs/trusted-evaluation-contract-plan.md')
          text = trusted.read_text()
          text = text.replace('- Status: active implementation', '- Status: complete', 1)
          marker = '## 9. Completion record'
          if marker not in text:
              text += '''

## 9. Completion record

M5A completed on 2026-07-24.

The final implementation baseline is `9d529e2cc549c5d2508a190b267a07361f302659` from PR #60.

The complete product-path evidence is in `docs/m5a-dogfood.md` and `tests/m5a-dogfood.test.ts`.

CI #621 passes 79 test files and 300 tests on Ubuntu, macOS, and Windows with Node.js 22 and 24.

All eight M5A vertical slices are complete:

1. metric reports;
2. evaluation validity;
3. feedback and evaluation budgets;
4. evaluator integrity;
5. evaluation-contract authoring;
6. transport-neutral evaluator adapters;
7. complete evaluation product surface;
8. executable dogfood and closeout.

M5B Hypagoal is the next milestone. It must reuse this evaluation contract and one canonical Hypagraph workflow.
'''
          trusted.write_text(text)

          readme = Path('README.md')
          text = readme.read_text()
          needle = '- [Trusted evaluation contracts](docs/trusted-evaluation-contract-plan.md)\n'
          addition = needle + '- [M5A trusted evaluation dogfood](docs/m5a-dogfood.md)\n'
          if 'docs/m5a-dogfood.md' not in text:
              if needle not in text:
                  raise SystemExit('README documentation insertion point was not found')
              text = text.replace(needle, addition, 1)
          readme.write_text(text)

          product = Path('docs/product-spec.md')
          text = product.read_text()
          text = text.replace(
              'Planned work includes evaluation-contract authoring, a transport-neutral evaluator adapter, Hypagoal, delegated execution, worktree leases, ACP integration, and bounded parallel scheduling.',
              'M5A trusted evaluation contracts are complete. Planned work includes M5B Hypagoal, delegated execution, worktree leases, production isolated evaluation, ACP integration, and bounded parallel scheduling.',
              1,
          )
          text = text.replace(
              '3. M5A metric reports, validity, feedback, budgets, and integrity. Slices 1-4 complete; closeout in PR #56.\n4. M5A evaluation authoring, adapter contract, product surface, and dogfood.\n5. M5B Hypagoal autonomous controller.\n6. Event debugger UI.\n7. Executor abstraction and production isolated evaluation.\n8. Workspace integration and bounded concurrency.\n9. ACP and direct agent adapters.',
              '3. M5A trusted evaluation contracts. Complete through PR #60 and `docs/m5a-dogfood.md`.\n4. M5B Hypagoal autonomous controller.\n5. Event debugger UI.\n6. Executor abstraction and production isolated evaluation.\n7. Workspace integration and bounded concurrency.\n8. ACP and direct agent adapters.',
              1,
          )
          product.write_text(text)
          PY
          git rm .github/workflows/apply-m5a-closeout-docs.yml
      - name: Commit documentation closeout
        shell: bash
        run: |
          git config user.name "Hypagraph Automation"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs/product-spec.md docs/trusted-evaluation-contract-plan.md
          git commit -m "Complete M5A documentation closeout"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

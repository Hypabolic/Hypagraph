name: Apply M4 Slice 6

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m4-slice-6-independent-outcomes'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 6 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-6-independent-outcomes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply Slice 6
        shell: bash
        run: |
          set +e
          {
            python3 scripts/fix-m4-slice6-anchors.py
            python3 scripts/apply-m4-slice6.py
            python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old in text:
                  file.write_text(text.replace(old, new, 1))
                  return
              if new not in text:
                  raise SystemExit(f"Required generated text was not found in {path}")

          replace_once(
              "src/graph/projection.ts",
              '  failurePolicy: "fail-workflow" | "block-dependants" | "record-and-continue";\n',
              '  failurePolicy?: "fail-workflow" | "block-dependants" | "record-and-continue";\n',
          )
          replace_once(
              "src/domain/reducer.ts",
              'const appendCompletionIfNeeded = (state: HypagraphState, events: DomainEvent[], command: { commandId: string; correlationId?: string; at: string }): HypagraphState => workflowCanComplete(state) && state.phase !== "completed" ? append(state, events, command, { type: "hypagraph.workflow.completed" }) : state;\n',
              'const appendCompletionIfNeeded = (state: HypagraphState, events: DomainEvent[], command: { commandId: string; correlationId?: string; at: string }): HypagraphState => workflowCanComplete(state) ? append(state, events, command, { type: "hypagraph.workflow.completed" }) : state;\n',
          )
          replace_once(
              "src/ui/format.ts",
              '      lines.push(`- ${loop.id}: ${runtime?.status ?? "pending"} - iteration ${runtime?.currentIteration ?? 0}/${loop.maxIterations} - policy ${loopFailurePolicy(loop)}${runtime?.exitReason ? ` - ${runtime.exitReason}` : ""}${progress}`);\n',
              '      lines.push(`- ${loop.id}: ${runtime?.status ?? "pending"} - iteration ${runtime?.currentIteration ?? 0}/${loop.maxIterations}${runtime?.exitReason ? ` - ${runtime.exitReason}` : ""} - policy ${loopFailurePolicy(loop)}${progress}`);\n',
          )
          replace_once(
              "src/graph/layout.ts",
              '''  const layoutNodes: GraphLayoutNode[] = [];
          for (const [nodeRank, ids] of [...nodesByRank.entries()].sort((left, right) => left[0] - right[0])) {
            ids.sort((left, right) => {
              const leftComponent = view.nodes.find((node) => node.id === left)?.componentId ?? "";
              const rightComponent = view.nodes.find((node) => node.id === right)?.componentId ?? "";
              const componentOrder = leftComponent.localeCompare(rightComponent);
              if (componentOrder !== 0) return componentOrder;
              const previousLeft = previousById.get(left);
              const previousRight = previousById.get(right);
              if (previousLeft && previousRight && previousLeft.rank === previousRight.rank) {
                return previousLeft.order - previousRight.order || left.localeCompare(right);
              }
              if (previousLeft && !previousRight) return -1;
              if (!previousLeft && previousRight) return 1;
              return left.localeCompare(right);
            });
            ids.forEach((id, order) => {
              layoutNodes.push({
                id,
                x: metrics.margin + nodeRank * (metrics.nodeWidth + metrics.horizontalGap),
                y: metrics.margin + order * (metrics.nodeHeight + metrics.verticalGap),
                width: metrics.nodeWidth,
                height: metrics.nodeHeight,
                rank: nodeRank,
                order,
              });
            });
          }
          layoutNodes.sort((left, right) => left.id.localeCompare(right.id));
          ''',
              '''  const componentByNode = new Map(view.nodes.map((node) => [node.id, node.componentId ?? `component:${node.id}`]));
          const componentIds = [...new Set(visibleNodes.map((node) => componentByNode.get(node.id)!))].sort();
          const maxRowsByComponent = new Map(componentIds.map((componentId) => [componentId, 1]));
          for (const ids of nodesByRank.values()) {
            for (const componentId of componentIds) {
              const count = ids.filter((id) => componentByNode.get(id) === componentId).length;
              maxRowsByComponent.set(componentId, Math.max(maxRowsByComponent.get(componentId) ?? 1, count));
            }
          }
          const componentBaseY = new Map<string, number>();
          let nextComponentY = metrics.margin;
          for (const componentId of componentIds) {
            componentBaseY.set(componentId, nextComponentY);
            nextComponentY += (maxRowsByComponent.get(componentId) ?? 1) * (metrics.nodeHeight + metrics.verticalGap) + metrics.verticalGap + 4;
          }

          const layoutNodes: GraphLayoutNode[] = [];
          for (const [nodeRank, ids] of [...nodesByRank.entries()].sort((left, right) => left[0] - right[0])) {
            for (const componentId of componentIds) {
              const componentIdsAtRank = ids.filter((id) => componentByNode.get(id) === componentId);
              componentIdsAtRank.sort((left, right) => {
                const previousLeft = previousById.get(left);
                const previousRight = previousById.get(right);
                if (previousLeft && previousRight && previousLeft.rank === previousRight.rank) return previousLeft.order - previousRight.order || left.localeCompare(right);
                if (previousLeft && !previousRight) return -1;
                if (!previousLeft && previousRight) return 1;
                return left.localeCompare(right);
              });
              componentIdsAtRank.forEach((id, order) => {
                layoutNodes.push({
                  id,
                  x: metrics.margin + nodeRank * (metrics.nodeWidth + metrics.horizontalGap),
                  y: (componentBaseY.get(componentId) ?? metrics.margin) + order * (metrics.nodeHeight + metrics.verticalGap),
                  width: metrics.nodeWidth,
                  height: metrics.nodeHeight,
                  rank: nodeRank,
                  order,
                });
              });
            }
          }
          layoutNodes.sort((left, right) => left.id.localeCompare(right.id));
          ''',
          )
          PY
          } > apply.log 2>&1
          status=$?
          cat apply.log
          exit $status

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-slice6-diagnostics
          path: |
            apply.log
            check.log

      - name: Commit Slice 6
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs skills src tests
          if git diff --cached --quiet; then
            echo "Slice 6 product files are already current."
          else
            git commit -m "Implement M4 Slice 6 independent outcomes"
            git push origin HEAD:agent/m4-slice-6-independent-outcomes
          fi

name: Apply M4 Slice 6

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m4-slice-6-independent-outcomes'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 6 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-6-independent-outcomes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply Slice 6
        shell: bash
        run: |
          set +e
          {
            python3 scripts/fix-m4-slice6-anchors.py
            python3 scripts/apply-m4-slice6.py
            python3 - <<'PY'
          from pathlib import Path
          path = Path("src/graph/projection.ts")
          text = path.read_text()
          old = '  failurePolicy: "fail-workflow" | "block-dependants" | "record-and-continue";\n'
          new = '  failurePolicy?: "fail-workflow" | "block-dependants" | "record-and-continue";\n'
          if old in text:
              path.write_text(text.replace(old, new, 1))
          elif new not in text:
              raise SystemExit("The generated failurePolicy field was not found.")
          PY
          } > apply.log 2>&1
          status=$?
          cat apply.log
          exit $status

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-slice6-diagnostics
          path: |
            apply.log
            check.log

      - name: Commit Slice 6
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs skills src tests
          if git diff --cached --quiet; then
            echo "Slice 6 product files are already current."
          else
            git commit -m "Implement M4 Slice 6 independent outcomes"
            git push origin HEAD:agent/m4-slice-6-independent-outcomes
          fi

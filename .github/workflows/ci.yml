name: Publish Hypagraph v0.6

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  verify:
    name: ${{ matrix.os }} · Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22
          - 24

    steps:
      - name: Check out the exact release commit
        uses: actions/checkout@v4
        with:
          ref: 90a2885bb8f46d61cedd803897ca4d32246bcb44

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run type checks and tests
        id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-check-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: check.log

  publish:
    name: Tag and publish v0.6
    needs: verify
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EXPECTED_SHA: 90a2885bb8f46d61cedd803897ca4d32246bcb44
    steps:
      - name: Check out the exact release commit
        uses: actions/checkout@v4
        with:
          ref: 90a2885bb8f46d61cedd803897ca4d32246bcb44
          fetch-depth: 0

      - name: Verify publication identity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          test "$(git ls-remote origin refs/heads/main | cut -f1)" = "$EXPECTED_SHA"
          test "$(node -p "require('./package.json').version")" = "0.6.0"
          test "$(node -p "require('./package-lock.json').version")" = "0.6.0"
          if git ls-remote --tags origin refs/tags/v0.6 | grep -q .; then
            echo "Tag v0.6 already exists." >&2
            exit 1
          fi
          if gh release view v0.6 >/dev/null 2>&1; then
            echo "Release v0.6 already exists." >&2
            exit 1
          fi

      - name: Create tag and release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a v0.6 "$EXPECTED_SHA" -m "Hypagraph v0.6"
          git push origin refs/tags/v0.6
          gh release create v0.6 \
            --target "$EXPECTED_SHA" \
            --title "Hypagraph v0.6" \
            --notes-file docs/v0.6-release-notes.md

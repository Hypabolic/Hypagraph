name: Close v0.6 planning

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  closeout:
    if: github.head_ref == 'agent/m5b-v0-6-closeout'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the closeout branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5b-v0-6-closeout
          fetch-depth: 0

      - name: Update canonical plans
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new))

          replace_once(
              'docs/execution-roadmap.md',
              '- Current milestone: M5B Hypagoal\n- Current implementation baseline: `90c54214c5337be01e455145a36232a392172fae`',
              '- Current milestone: M6 event history, replay, and debugger UI\n- Current implementation baseline: `90a2885bb8f46d61cedd803897ca4d32246bcb44`\n- Current release: `v0.6`',
          )
          replace_once(
              'docs/execution-roadmap.md',
              '| M5B | v0.6 | Root Hypagoal autonomous controller | Active; Slices 1 through 7 complete; Slice 8 current |\n| M6 | v0.7 | Event history, replay, and debugger UI | Planned |',
              '| M5B | v0.6 | Root Hypagoal autonomous controller | Complete; released as v0.6 |\n| M6 | v0.7 | Event history, replay, and debugger UI | Active |',
          )
          replace_once(
              'docs/execution-roadmap.md',
              '8. Dogfood and v0.6 release — current.',
              '8. Dogfood and v0.6 release — complete in PR #77.',
          )
          replace_once(
              'docs/execution-roadmap.md',
              'Slice 8 is the final integrated dogfood and v0.6 release slice. It must validate the complete root-Hypagoal product path on the tested main commit before version alignment, tagging, and release.',
              '''### Slice 8 result

M5B Slice 8 provides:

- one integrated Pi product path which starts from `/hypagoal`;
- a four-evaluation optimization region with invalid-result rejection and typed success;
- one independent bounded auxiliary region with event-backed fairness;
- reload pause, explicit resume, and restore without dispatch;
- one probe evaluation and deterministic gate route;
- one typed repository blocker and one applied non-weakening automatic revision;
- canonical final workflow and goal completion only;
- package and lock-file version `0.6.0`;
- updated README, changelog, release notes, and dogfood evidence;
- exact-main publication after the complete six-target matrix.

The release baseline is `90a2885bb8f46d61cedd803897ca4d32246bcb44`. PR #77 and final candidate CI #1111 pass 95 test files and 461 tests. Publication gate CI #1114 passes the same six targets and creates tag and release `v0.6` from that exact commit.

M5B is complete. Evidence is in `docs/v0.6-dogfood.md`.''',
          )
          replace_once(
              'docs/execution-roadmap.md',
              '- The root workflow can later become a one-member family without rewriting its workflow events.\n\n## 7. M6 - Event history, replay, and debugger UI',
              '- The root workflow can later become a one-member family without rewriting its workflow events.\n\nAll M5B acceptance criteria are satisfied in v0.6.\n\n## 7. M6 - Event history, replay, and debugger UI',
          )

          replace_once(
              'docs/hypagoal-vertical-slice-plan.md',
              '- Status: active implementation; Slices 1 through 7 complete; Slice 8 current',
              '- Status: complete; released as v0.6',
          )
          start = '### Slice 8 - Dogfood and release — current\n'
          end = '\n## 7. Test strategy\n'
          plan = Path('docs/hypagoal-vertical-slice-plan.md')
          text = plan.read_text()
          if text.count(start) != 1 or text.count(end) != 1:
              raise SystemExit('Hypagoal Slice 8 section markers were not unique.')
          before, rest = text.split(start, 1)
          _, after = rest.split(end, 1)
          result = '''### Slice 8 - Dogfood and release — complete

PR #77 delivered:

- one integrated `/hypagoal` product path;
- one four-evaluation optimization region and one independent auxiliary region;
- invalid-evaluation rejection before accepted progress;
- numeric improvements from `0.4` to `0.7` to typed success at `0.9`;
- one probe evaluation at `0.95` and one deterministic gate route;
- reload pause, explicit resume, exact accounting, and restore without dispatch;
- one typed repository blocker and one consumed, accepted, non-weakening automatic revision;
- final completion derived only from canonical workflow state;
- root identity compatibility with a future one-member goal family;
- package and lock-file version `0.6.0`;
- release documentation and installation updates.

The release baseline is `90a2885bb8f46d61cedd803897ca4d32246bcb44`.

CI #1108 validates the integrated product path. Final PR CI #1111 and exact-main publication gate CI #1114 pass 95 test files and 461 tests on Ubuntu, macOS, and Windows with Node.js 22 and 24.

Tag and GitHub release `v0.6` point to the tested release baseline. Complete evidence is in `docs/v0.6-dogfood.md`.
'''
          plan.write_text(before + result + end + after)
          replace_once(
              'docs/hypagoal-vertical-slice-plan.md',
              'M5B is active. Slices 1 through 7 are complete. Slice 8 is the current implementation and release target.',
              'M5B is complete and released as v0.6. M6 event history, replay, and debugger UI is the current roadmap phase.',
          )

          replace_once(
              'docs/product-spec.md',
              '- Version: implementation baseline through M5B Slice 7\n- Current baseline: `90c54214c5337be01e455145a36232a392172fae`',
              '- Version: v0.6 release baseline\n- Current baseline: `90a2885bb8f46d61cedd803897ca4d32246bcb44`\n- Current milestone: M6 event history, replay, and debugger UI',
          )
          replace_once(
              'docs/product-spec.md',
              '- narrow and wide terminal rendering.',
              '''- narrow and wide terminal rendering;
- one integrated root-Hypagoal release path across loops, evaluation, gates, reload recovery, bounded revision, and canonical completion;
- package and lock-file version `0.6.0`;
- tag and GitHub release `v0.6` on the exact tested main commit.''',
          )
          replace_once(
              'docs/product-spec.md',
              'M5B Slices 1 through 7 are complete in PRs #62, #65, #67, #69, #71, #73, and #75. Slice 8, final integrated dogfood and v0.6 release, is the current target.',
              'M5B Slices 1 through 8 are complete in PRs #62, #65, #67, #69, #71, #73, #75, and #77. M5A and M5B are released as v0.6. M6 is the current target.',
          )
          replace_once(
              'docs/product-spec.md',
              '4. M5B root Hypagoal autonomous controller — active; Slices 1 through 7 complete; Slice 8 current.\n5. M6 event history, replay, and debugger UI.',
              '4. M5B root Hypagoal autonomous controller — complete and released as v0.6.\n5. M6 event history, replay, and debugger UI — current.',
          )
          old_validation = '''## Validation baseline

CI #1075 and final PR CI #1077 pass:

- Ubuntu with Node.js 22 and 24;
- macOS with Node.js 22 and 24;
- Windows with Node.js 22 and 24.

The complete suite contains 94 test files and 460 tests.'''
          new_validation = '''## Validation baseline

Final release-candidate CI #1111 and exact-main publication gate CI #1114 pass:

- Ubuntu with Node.js 22 and 24;
- macOS with Node.js 22 and 24;
- Windows with Node.js 22 and 24.

The complete suite contains 95 test files and 461 tests.

Release `v0.6` points to `90a2885bb8f46d61cedd803897ca4d32246bcb44`.'''
          replace_once('docs/product-spec.md', old_validation, new_validation)

          dogfood = Path('docs/v0.6-dogfood.md')
          text = dogfood.read_text()
          replace = '''- Release candidate pull request: #77
- Release merge: `90a2885bb8f46d61cedd803897ca4d32246bcb44`
- Integrated test: `tests/m5b-v0-6-release-dogfood.test.ts`
- Candidate verification before release metadata: CI #1108
- Final release-candidate verification: CI #1111
- Exact-main publication gate: CI #1114
- Candidate suite: 95 test files and 461 tests
- Tag and release: `v0.6`'''
          old = '''- Release candidate pull request: #77
- Integrated test: `tests/m5b-v0-6-release-dogfood.test.ts`
- Candidate verification before release metadata: CI #1108
- Candidate suite: 95 test files and 461 tests'''
          if text.count(old) != 1:
              raise SystemExit('Dogfood metadata block was not found once.')
          text = text.replace(old, replace)
          old_gate = '''## 7. Release gate

The v0.6 tag and GitHub release must point to the exact merged `main` commit which passes the complete six-target matrix.

The final merge SHA, main-branch CI run, tag, and release URL are recorded after publication.'''
          new_gate = '''## 7. Release publication

Final PR CI #1111 validates the release candidate on all six supported targets.

Publication gate CI #1114 checks out exact main commit `90a2885bb8f46d61cedd803897ca4d32246bcb44`, repeats all six checks, verifies package and lock-file version `0.6.0`, verifies that `main` still points to that commit, and only then creates tag and GitHub release `v0.6`.

Release URL: https://github.com/Hypabolic/Hypagraph/releases/tag/v0.6'''
          if text.count(old_gate) != 1:
              raise SystemExit('Dogfood release gate block was not found once.')
          dogfood.write_text(text.replace(old_gate, new_gate))

          Path('docs/session-handoff.md').write_text('''# Session handoff: v0.6 released to M6

- Handoff date: 2026-07-24
- Repository: `Hypabolic/Hypagraph`
- Canonical branch: `main`
- Release baseline: `90a2885bb8f46d61cedd803897ca4d32246bcb44`
- Release: `v0.6`
- Release pull request: #77 — Dogfood and release Hypagoal v0.6
- Completed milestone: M5B root Hypagoal autonomous controller
- Current milestone: M6 event history, replay, and debugger UI
- Hypagoal tracking issue: #25

## 1. Read first

Read these files in order:

1. `AGENTS.md`;
2. `docs/session-handoff.md`;
3. `docs/execution-roadmap.md`;
4. `docs/product-spec.md`;
5. `docs/hypagoal-vertical-slice-plan.md`;
6. `docs/v0.6-dogfood.md`;
7. `docs/event-sourcing-and-replay.md` if it exists;
8. `docs/goal-family-and-concurrent-execution-plan.md`;
9. issue #25 for the completed M5B record.

## 2. Released state

M5A and M5B are complete and released as v0.6.

The release contains:

- trusted evaluation contracts;
- one workflow-local root Hypagoal lifecycle;
- atomic `/hypagoal` creation from ordinary prose;
- graph-aware automatic continuation;
- exact turn and normalized token budgets;
- reload, branch-change, and invalid-usage pause;
- loop-aware and trusted-evaluation-aware continuation;
- deterministic canonical blocker classification;
- one bounded non-weakening automatic workflow revision;
- `/hypagoal` status, pause, resume, cancel, and graph controls;
- compact lifecycle messages and explicit typed stop reasons;
- complete integrated release dogfood.

Final release-candidate CI #1111 and exact-main publication gate CI #1114 pass 95 test files and 461 tests on Ubuntu, macOS, and Windows with Node.js 22 and 24.

Tag and GitHub release `v0.6` point to `90a2885bb8f46d61cedd803897ca4d32246bcb44`.

## 3. Preserved invariants

Do not weaken these invariants during M6:

- canonical state changes only through the controller and reducers;
- workflow state remains authoritative for goal completion;
- the model has no workflow-completion or goal-completion tool;
- one durable event sequence defines one workflow aggregate;
- snapshot hashes include canonical state;
- stale, cancelled, and pre-revision results cannot change current state;
- restore and replay do not repeat external effects;
- protected evaluator internals remain outside model-visible output;
- independent branches and bounded regions keep independent lifecycle state;
- the v0.6 root can later become a one-member goal family without rewriting workflow events.

## 4. Current target: M6

### Objective

Make execution history, replay, and controller decisions inspectable without changing canonical workflow semantics.

### Proposed vertical slices

1. Add a transport-neutral event-history projection with stable event identity and protected-data filtering.
2. Add replay to an exact event sequence and compare live state with replay state.
3. Add deterministic decision explanations for readiness, blockage, gates, loops, evaluations, budgets, revisions, and goal state.
4. Add Pi event-timeline and replay controls.
5. Add live-versus-replay graph rendering and preserve graph positions across small revisions.
6. Add revision, invalidation, stale-result, and external-effect history views.
7. Add future family, executor, workspace, and integration projection seams without implementing those runtimes.
8. Dogfood, harden, document, and release v0.7.

### Slice 1 recommendation

Start with the pure event-history projection.

Suggested branch:

`agent/m6-slice-1-event-history-projection`

Suggested pull request title:

`Add event history projection`

### Slice 1 product result

A caller can request a bounded chronological projection of persisted events and receive:

- stable sequence and event identity;
- event type and timestamp;
- workflow, goal, revision, node, loop, attempt, check, and continuation identity when present;
- a concise public summary;
- explicit redaction markers for protected evaluator data;
- enough metadata for later timeline grouping and replay selection.

### Slice 1 constraints

- Do not add a second event store.
- Do not change reducer semantics.
- Do not replay external effects.
- Do not expose protected evaluator commands, paths, hashes, reports, stdout, stderr, or holdout details.
- Do not add goal families, executors, worktrees, or physical concurrency.
- Keep the projection independent of Pi.
- Keep future family and executor identities additive.

### Slice 1 terminal coverage

Cover at least:

- workflow definition and revision;
- node attempts and verification;
- checks and typed facts;
- gates and selected routes;
- loop iteration, evaluation, success, and bounded failure;
- goal start, pause, resume, budget stop, blockage, revision, completion, failure, and cancellation;
- stale continuation and stale result rejection;
- reload and branch-change pause;
- malformed or legacy events which the current schema can restore.

## 5. Release evidence

- Integrated dogfood: `docs/v0.6-dogfood.md`.
- Release notes: `docs/v0.6-release-notes.md`.
- Implementation PR: #77.
- Release baseline: `90a2885bb8f46d61cedd803897ca4d32246bcb44`.
- Candidate CI: #1111.
- Exact-main publication gate: #1114.
- Suite: 95 test files and 461 tests.
- Release: https://github.com/Hypabolic/Hypagraph/releases/tag/v0.6

## 6. Deferred product direction

The following work remains accepted but deferred beyond M6:

- goal-family persistence;
- recursive child Hypagoals;
- executor abstraction and isolated Pi execution;
- worktree leases and integration;
- bounded physical concurrency;
- ACP and named direct agent adapters.
''')

      - name: Install locked dependencies
        run: npm ci

      - name: Validate closeout
        run: npm run check

      - name: Restore canonical CI and commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/execution-roadmap.md docs/hypagoal-vertical-slice-plan.md docs/product-spec.md docs/session-handoff.md docs/v0.6-dogfood.md .github/workflows/ci.yml
          git commit -m "Close M5B and make M6 current"
          git push origin HEAD:agent/m5b-v0-6-closeout

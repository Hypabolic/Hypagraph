name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  apply-goal-lifecycle:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/m5b-slice-1-goal-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Execute the temporary patch
        shell: bash
        run: |
          set +e
          python - <<'PY' > goal-patch.log 2>&1
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/apply-m5b-goal-lifecycle.yml').read_text()
          marker = "python - <<'PY'\n"
          if marker not in workflow:
              raise SystemExit('The temporary patch script marker was not found.')
          block = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          exec(dedent(block), {'__name__': '__main__'})
          PY
          status=$?
          cat goal-patch.log
          exit $status

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goal-lifecycle-patch-log
          path: goal-patch.log

      - name: Restore CI and commit the product patch
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name "Hypagraph Automation"
          git config user.email "actions@users.noreply.github.com"
          git add src/domain/model.ts src/domain/reducer.ts src/domain/projection.ts src/persistence/session-rebuild.ts src/ui/format.ts src/domain/goal-policy.ts .github/workflows/ci.yml .github/workflows/apply-m5b-goal-lifecycle.yml
          git commit -m "Implement canonical goal lifecycle"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  check:
    name: ${{ matrix.os }} · Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22
          - 24

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run type checks and tests
        id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-log-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: check.log

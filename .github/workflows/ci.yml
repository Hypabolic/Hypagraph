name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  apply-hardening:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5b-slice-2-hypagoal-creation
          fetch-depth: 0

      - name: Apply the hardening patch
        run: python scripts/apply-m5b-slice2-hardening.py

      - name: Remove temporary patch script
        run: rm scripts/apply-m5b-slice2-hardening.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Hypagoal authoring identity"
          git push origin HEAD:agent/m5b-slice-2-hypagoal-creation

  check:
    name: ${{ matrix.os }} · Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22
          - 24

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run type checks and tests
        id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-log-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: |
            check.log
            src/extension.ts

name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.os }} · Node.js ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 22
          - 24

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run type checks and tests
        id: check
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-log-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: check.log

      - name: Upload Slice 3 source
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: slice3-source
          path: |
            .
            !.git/**
            !node_modules/**

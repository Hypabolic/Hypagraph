name: Apply M5B Slice 2 hardening

on:
  push:
    branches:
      - agent/m5b-slice-2-hypagoal-creation
    paths:
      - scripts/apply-m5b-slice2-hardening.py
      - .github/workflows/apply-m5b-slice2-hardening.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5b-slice-2-hypagoal-creation
          fetch-depth: 0

      - name: Apply the hardening patch
        run: python scripts/apply-m5b-slice2-hardening.py

      - name: Remove temporary patch script
        run: rm scripts/apply-m5b-slice2-hardening.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden Hypagoal authoring identity"
          git push origin HEAD:agent/m5b-slice-2-hypagoal-creation

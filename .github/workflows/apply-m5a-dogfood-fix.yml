name: Apply M5A dogfood fixture fix

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/m5a-slice-8-dogfood'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Align stale-result fact contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/m5a-dogfood.test.ts')
          text = path.read_text()
          old = 'produces: [{ name: "evaluation.score", type: "number", required: false }],'
          new = 'produces: [{ name: "evaluation.score", type: "number", required: true }],'
          if text.count(old) != 1:
              raise SystemExit(f'Expected one fixture contract, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          git rm .github/workflows/apply-m5a-dogfood-fix.yml
      - name: Commit fixture correction
        shell: bash
        run: |
          git config user.name "Hypagraph Automation"
          git config user.email "actions@users.noreply.github.com"
          git add tests/m5a-dogfood.test.ts
          git commit -m "Fix M5A stale-result dogfood contract"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

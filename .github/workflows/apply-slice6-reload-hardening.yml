name: Apply Slice 6 reload hardening

on:
  push:
    branches:
      - agent/m5b-slice-6-blockage-bounded-revision

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply and validate reload hardening
        shell: bash
        run: |
          python .agent/harden.py.02
          npm ci
          npm run check
          rm -rf .agent
          rm -f .github/workflows/apply-slice6-reload-hardening.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden bounded revision reload safety"
          git push

name: Apply Hypagoal naming

on:
  push:
    branches:
      - agent/plan-graph-backed-goal-mode

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/plan-graph-backed-goal-mode
          fetch-depth: 0

      - name: Apply naming
        run: |
          python - <<'PY'
          from pathlib import Path

          old_path = Path("docs/goal-mode-vertical-slice-plan.md")
          new_path = Path("docs/hypagoal-vertical-slice-plan.md")
          text = old_path.read_text(encoding="utf-8")

          replacements = [
              ("Graph-backed goal mode", "Hypagoal"),
              ("graph-backed goal mode", "Hypagoal"),
              ("Goal mode", "Hypagoal"),
              ("goal mode", "Hypagoal"),
              ("goal-mode", "Hypagoal"),
              ("/goal", "/hypagoal"),
              ("hypagraph_goal_start", "hypagoal_start"),
          ]
          for source, target in replacements:
              text = text.replace(source, target)

          new_path.write_text(text, encoding="utf-8")
          old_path.unlink()

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme = readme.replace(
              "[Graph-backed goal mode vertical-slice plan](docs/goal-mode-vertical-slice-plan.md)",
              "[Hypagoal vertical-slice plan](docs/hypagoal-vertical-slice-plan.md)",
          )
          readme = readme.replace(
              "docs/goal-mode-vertical-slice-plan.md",
              "docs/hypagoal-vertical-slice-plan.md",
          )
          readme_path.write_text(readme, encoding="utf-8")
          PY

          git rm .github/workflows/apply-hypagoal-naming.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/goal-mode-vertical-slice-plan.md docs/hypagoal-vertical-slice-plan.md
          git commit -m "Use Hypagoal naming"
          git push

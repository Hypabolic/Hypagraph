name: Fix M4 Slice 5 schema compatibility

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/m4-slice-5-progress-patience'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 5 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-5-progress-patience

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply the schema compatibility fix
        run: python3 scripts/fix-m4-slice5-schema3.py

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Commit the compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Preserve schema-3 loop snapshot compatibility"
          git push origin HEAD:agent/m4-slice-5-progress-patience

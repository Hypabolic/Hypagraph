name: Apply Slice 3 CI fix

on:
  pull_request:
    types: [edited]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m5a-slice-3-feedback-budgets'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5a-slice-3-feedback-budgets
          fetch-depth: 0
      - name: Apply fixes
        run: git apply .github/slice3-ci-fix.patch
      - name: Commit fixes
        run: |
          rm .github/slice3-ci-fix.patch
          git config user.name "Hypagraph automation"
          git config user.email "actions@users.noreply.github.com"
          git add --all
          git commit -m "Fix evaluation budget type inference"
      - name: Push fixes
        run: git push origin HEAD:agent/m5a-slice-3-feedback-budgets

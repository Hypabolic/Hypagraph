name: Apply automatic graph authoring model

on:
  push:
    branches:
      - agent/automatic-graph-authoring

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/automatic-graph-authoring
          fetch-depth: 0

      - name: Apply product and skill changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"Expected text not found in {path}: {old[:120]!r}")
              file.write_text(text.replace(old, new, 1))

          replace_exact(

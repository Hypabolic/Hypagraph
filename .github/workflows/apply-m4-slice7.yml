name: Apply M4 Slice 7

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m4-slice-7-recovery-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 7 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-7-recovery-hardening

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply Slice 7
        shell: bash
        run: |
          set +e
          python3 scripts/apply-m4-slice7.py > apply.log 2>&1
          status=$?
          cat apply.log
          exit $status

      - name: Install locked dependencies
        if: success()
        run: npm ci

      - name: Run repository checks
        if: success()
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-slice7-diagnostics
          path: |
            apply.log
            check.log

      - name: Commit Slice 7
        if: success()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs skills src tests
          if git diff --cached --quiet; then
            echo "Slice 7 product files are already current."
          else
            git commit -m "Implement M4 Slice 7 recovery hardening"
            git push origin HEAD:agent/m4-slice-7-recovery-hardening
          fi

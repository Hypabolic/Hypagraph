name: Apply M4 Slice 1

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m4-slice-1-one-iteration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-1-one-iteration

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply the domain implementation
        run: python3 scripts/apply-m4-slice1-domain.py

      - name: Apply validation, surfaces, and tests
        run: python3 scripts/apply-m4-slice1-surface.py

      - name: Apply type corrections
        run: python3 scripts/fix-m4-slice1.py

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          tail -n 250 check.log
          exit $status

      - name: Upload check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-slice1-check-log
          path: check.log

      - name: Commit Slice 1
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests README.md docs/m4-vertical-slice-plan.md
          git commit -m "Implement M4 Slice 1 one-iteration loops"
          git push origin HEAD:agent/m4-slice-1-one-iteration

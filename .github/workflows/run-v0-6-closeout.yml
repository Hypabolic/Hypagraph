name: Run v0.6 closeout

on:
  pull_request:
    branches:
      - main
    types:
      - ready_for_review

permissions:
  contents: write

jobs:
  closeout:
    if: github.head_ref == 'agent/m5b-v0-6-closeout'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m5b-v0-6-closeout
          fetch-depth: 0

      - name: Execute stored closeout update
        id: transform
        continue-on-error: true
        shell: python
        run: |
          from pathlib import Path
          from textwrap import dedent
          import traceback

          workflow = Path('.github/workflows/ci.yml').read_text()
          start = '      - name: Update canonical plans\n        shell: python\n        run: |\n'
          end = '\n      - name: Install locked dependencies\n'
          try:
              if workflow.count(start) != 1 or workflow.count(end) != 1:
                  raise RuntimeError('Stored closeout script markers were not unique.')
              script = workflow.split(start, 1)[1].split(end, 1)[0]
              exec(compile(dedent(script), 'stored-closeout.py', 'exec'))
          except Exception:
              Path('closeout-error.txt').write_text(traceback.format_exc())
              raise

      - name: Upload closeout diagnostics
        if: steps.transform.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: v0-6-closeout-error
          path: closeout-error.txt

      - name: Stop after transformation failure
        if: steps.transform.outcome == 'failure'
        shell: bash
        run: exit 1

      - name: Install locked dependencies
        run: npm ci

      - name: Validate closeout
        run: npm run check

      - name: Commit clean documentation closeout
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/run-v0-6-closeout.yml .agent/v0-6-closeout-trigger
          git add docs/execution-roadmap.md docs/hypagoal-vertical-slice-plan.md docs/product-spec.md docs/session-handoff.md docs/v0.6-dogfood.md .github/workflows/ci.yml
          git commit -m "Close M5B and make M6 current"
          git push origin HEAD:agent/m5b-v0-6-closeout

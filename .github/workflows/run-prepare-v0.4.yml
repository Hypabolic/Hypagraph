name: Run v0.4 release preparation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'agent/m3-slice-10-v0.4-release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release branch
        uses: actions/checkout@v4
        with:
          ref: agent/m3-slice-10-v0.4-release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare release files
        run: python3 scripts/prepare-v0.4.py

      - name: Install dependencies
        run: npm install

      - name: Run repository checks
        run: npm run check

      - name: Commit the release preparation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Prepare Hypagraph v0.4 release"
          git push origin HEAD:agent/m3-slice-10-v0.4-release

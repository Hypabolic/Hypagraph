name: Apply Slice 3 patch

on:
  pull_request:
    types: [edited]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m5a-slice-3-feedback-budgets'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5a-slice-3-feedback-budgets
          fetch-depth: 0
      - name: Decode product patch
        run: base64 --decode .github/slice3.patch.gz.b64 | gzip --decompress > "$RUNNER_TEMP/slice3.patch"
      - name: Apply product patch
        run: git apply --exclude=.github/workflows/export-source.yml --exclude=src/domain/evaluation-policy.ts "$RUNNER_TEMP/slice3.patch"
      - name: Commit product patch
        run: |
          rm .github/slice3.patch.gz.b64
          git config user.name "Hypagraph automation"
          git config user.email "actions@users.noreply.github.com"
          git add --all
          git commit -m "Implement evaluation feedback and budgets"
      - name: Push product patch
        run: git push origin HEAD:agent/m5a-slice-3-feedback-budgets

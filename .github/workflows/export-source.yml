name: Apply Slice 3 patch

on:
  push:
    branches:
      - agent/m5a-slice-3-feedback-budgets
    paths:
      - .github/slice3.patch

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/m5a-slice-3-feedback-budgets
          fetch-depth: 0
      - name: Apply product patch
        run: |
          git apply .github/slice3.patch
          rm .github/slice3.patch .github/workflows/export-source.yml
          git config user.name "Hypagraph automation"
          git config user.email "actions@users.noreply.github.com"
          git add --all
          git commit -m "Implement evaluation feedback and budgets"
          git push origin HEAD:agent/m5a-slice-3-feedback-budgets

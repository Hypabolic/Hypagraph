name: Apply final loop product model update

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/generalise-loop-product-model'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the planning branch
        uses: actions/checkout@v4
        with:
          ref: agent/generalise-loop-product-model

      - name: Apply the final graph component update
        run: python3 scripts/apply-loop-product-model-final.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Remove temporary migration files
        run: git rm scripts/apply-loop-product-model-final.py .github/workflows/apply-loop-product-model-final.yml

      - name: Commit the final documentation update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/pi-graph-visualisation-plan.md
          if git diff --cached --quiet; then
            echo "Graph component documentation is already current."
          else
            git commit -m "Define graph component projection"
            git push origin HEAD:agent/generalise-loop-product-model
          fi

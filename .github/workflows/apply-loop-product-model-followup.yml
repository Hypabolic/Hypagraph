name: Apply loop product model follow-up

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/generalise-loop-product-model'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the planning branch
        uses: actions/checkout@v4
        with:
          ref: agent/generalise-loop-product-model

      - name: Apply follow-up documentation changes
        run: python3 scripts/apply-loop-product-model-followup.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Remove temporary migration files
        run: git rm scripts/apply-loop-product-model-followup.py .github/workflows/apply-loop-product-model-followup.yml

      - name: Commit follow-up documentation changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs
          if git diff --cached --quiet; then
            echo "Loop product documentation is already current."
          else
            git commit -m "Complete generic loop planning sweep"
            git push origin HEAD:agent/generalise-loop-product-model
          fi

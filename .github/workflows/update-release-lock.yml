name: Update release lock

on:
  push:
    branches:
      - agent/m4-slice-9-release
    paths:
      - package.json
      - .github/workflows/update-release-lock.yml

permissions:
  contents: write

jobs:
  update-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-9-release

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Regenerate package lock metadata
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit package lock
        shell: bash
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "package-lock.json is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "Set v0.5.0 lockfile version"
          git push origin HEAD:agent/m4-slice-9-release

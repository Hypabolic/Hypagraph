name: Run automatic graph authoring update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/automatic-graph-authoring
          fetch-depth: 0

      - name: Extract and run the authoring migration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-automatic-graph-authoring.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Set up Node.js"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/apply-automatic-authoring.py').write_text(script)
          PY
          python /tmp/apply-automatic-authoring.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Commit product changes
        shell: bash
        run: |
          rm .github/workflows/apply-automatic-graph-authoring.yml
          rm .github/workflows/run-automatic-graph-authoring.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: make graph authoring automatic"
          git push origin HEAD:agent/automatic-graph-authoring

name: Harden M4 Slice 1

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  harden:
    if: github.head_ref == 'agent/m4-slice-1-one-iteration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-1-one-iteration

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply the hardening pass
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          path = Path("scripts/harden-m4-slice1.py")
          lines = path.read_text().splitlines()
          path.write_text("\n".join(line for line in lines if '`$' not in line and '`${runtime?.status ?? "inactive"}' not in line) + "\n")
          PY
          python3 scripts/harden-m4-slice1.py > apply.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python3 - <<'PY'
          from pathlib import Path
          replacements = {
              "src/ui/format.ts": [('runtime?.status ?? "inactive"', 'runtime?.status ?? "pending"')],
              "src/domain/readiness.ts": [('status !== "completed"', 'status !== "succeeded"')],
          }
          for name, items in replacements.items():
              path = Path(name)
              text = path.read_text()
              for old, new in items:
                  text = text.replace(old, new)
              path.write_text(text)
          PY
          fi
          cat apply.log
          exit $status

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          cat check.log
          exit $status

      - name: Upload hardening diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m4-slice1-hardening-log
          path: |
            apply.log
            check.log

      - name: Commit the hardening pass
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs src skills tests
          git commit -m "Harden M4 Slice 1 loop execution"
          git push origin HEAD:agent/m4-slice-1-one-iteration

name: Apply Slice 3 source schema fix

on:
  pull_request:
    types: [edited]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m5a-slice-3-feedback-budgets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/m5a-slice-3-feedback-budgets
          fetch-depth: 0
      - run: git apply .github/slice3-source-schema-fix.patch
      - run: |
          rm .github/slice3-source-schema-fix.patch
          git config user.name "Hypagraph automation"
          git config user.email "actions@users.noreply.github.com"
          git add --all
          git commit -m "Fix check source schema inference"
          git push origin HEAD:agent/m5a-slice-3-feedback-budgets

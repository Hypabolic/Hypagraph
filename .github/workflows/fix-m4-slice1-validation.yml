name: Fix M4 Slice 1 validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'agent/m4-slice-1-one-iteration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the Slice 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-slice-1-one-iteration

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Correct validation and add the regression test
        run: python3 scripts/fix-m4-slice1-validation.py

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Commit the correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/domain/validate.ts tests/validation.test.ts
          git commit -m "Fix loop gate fact-order validation"
          git push origin HEAD:agent/m4-slice-1-one-iteration

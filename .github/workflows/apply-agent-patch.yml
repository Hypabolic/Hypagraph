name: Apply agent patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and validate the agent patch
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            cat .agent/apply.py.gz.b64.* | base64 --decode | gzip --decompress > .agent/apply.py
            python - <<'PY'
          from pathlib import Path
          path = Path('.agent/apply.py')
          text = path.read_text()
          text = text.replace('""", count=2)', '""", count=3)')
          text = text.replace('"""       action: { kind: decision.kind', '"""      action: { kind: decision.kind')
          text = text.replace('"""       if (!state?.goal?.pendingContinuation)', '"""      if (!state?.goal?.pendingContinuation)')
          text = text.replace('\n       const semanticSequenceBeforeAccounting = state.sequence;', '\n      const semanticSequenceBeforeAccounting = state.sequence;')
          text = text.replace('\n       const normalized = normalizePiGoalUsage(_event.messages);', '\n      const normalized = normalizePiGoalUsage(_event.messages);')
          text = text.replace('"""       "hypagraph_revise",', '"""      "hypagraph_revise",')
          text = text.replace(
              '''      blockerKind: Type.Optional(StringEnum(["repository-work", "external-dependency", "safeguard", "unknown"] as const)),
              }),
          """, count=1)''',
              '''      blockerKind: Type.Optional(StringEnum(["repository-work", "external-dependency", "safeguard", "unknown"] as const)),
              }),
          """, count=2)''',
          )
          path.write_text(text)
          PY
            python .agent/apply.py
            python - <<'PY'
          from pathlib import Path

          path = Path('src/pi/hypagoal-loop-guidance.ts')
          text = path.read_text()
          text = text.replace('  GoalContinuationAction,\n', '  GoalWorkContinuationAction,\n')
          text = text.replace('Pick<GoalContinuationAction, "nodeId" | "loopId">', 'Pick<GoalWorkContinuationAction, "nodeId" | "loopId">')
          path.write_text(text)

          path = Path('src/extension.ts')
          text = path.read_text()
          blocker_field = '      blockerKind: Type.Optional(StringEnum(["repository-work", "external-dependency", "safeguard", "unknown"] as const)),\n'
          text = text.replace(blocker_field, '', 1)
          old = '''      if (!state?.goal?.pendingContinuation) return;
           if (delivered.action.kind === "request-revision" && !revisionProposalHandled && state.goal.automaticRevision.lastAttempt?.outcome === "pending") {
             const canonical = state.goal.pendingContinuation;'''
          new = '''      const goal = state?.goal;
          const canonical = goal?.pendingContinuation;
          if (!state || !goal || !canonical) return;
          if (delivered.action.kind === "request-revision" && !revisionProposalHandled && goal.automaticRevision.lastAttempt?.outcome === "pending") {'''
          if old not in text:
              raise RuntimeError('agent-end revision narrowing target was not found')
          text = text.replace(old, new, 1)
          marker = '      const goal = state?.goal;'
          start = text.find(marker)
          end = text.find('const semanticSequenceBeforeAccounting', start)
          if start < 0 or end <= start:
              raise RuntimeError('agent-end revision narrowing range was not found')
          segment = text[start:end].replace('goalId: state.goal.goalId', 'goalId: goal.goalId')
          text = text[:start] + segment + text[end:]
          path.write_text(text)

          path = Path('tests/hypagoal-revision.test.ts')
          text = path.read_text()
          old = '    expect(selectGoalContinuation({ ...structuredClone(value.state), goal: { ...structuredClone(value.state.goal!), pendingContinuation: undefined } })).toMatchObject({ kind: "stop-blocked" });'
          new = '    const exhausted = structuredClone(value.state);\n    delete exhausted.goal!.pendingContinuation;\n    expect(selectGoalContinuation(exhausted)).toMatchObject({ kind: "stop-blocked" });'
          text = text.replace(old, new)
          text = text.replace('runtime.nodes.migration.status', 'runtime.nodes.migration!.status')
          text = text.replace('runtime.nodes.independent.status', 'runtime.nodes.independent!.status')
          text = text.replace('runtime.nodes.independent.attemptCount', 'runtime.nodes.independent!.attemptCount')
          text = text.replace('runtime.nodes.prepare.status', 'runtime.nodes.prepare!.status')
          path.write_text(text)
          PY
            npm ci
            npm run check
          } > agent-run.log 2>&1
          status=$?
          printf '%s\n' "$status" > agent-status.txt
          git diff --binary > agent-output.patch
          exit $status

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-patch-diagnostics
          path: |
            agent-run.log
            agent-status.txt
            agent-output.patch
          if-no-files-found: error

      - name: Commit validated implementation
        if: steps.validate.outcome == 'success'
        shell: bash
        run: |
          rm -rf .agent agent-run.log agent-status.txt agent-output.patch
          rm -f .github/workflows/apply-agent-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add bounded Hypagoal revision"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Report validation failure
        if: steps.validate.outcome == 'failure'
        shell: bash
        run: |
          cat agent-run.log
          exit 1

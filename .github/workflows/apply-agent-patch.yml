name: Apply agent patch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply and validate the agent patch
        shell: bash
        run: |
          cat .agent/apply.py.gz.b64.* | base64 --decode | gzip --decompress > .agent/apply.py
          python .agent/apply.py
          npm ci
          npm run check
          rm -rf .agent
          rm -f .github/workflows/apply-agent-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add bounded Hypagoal revision"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

name: Apply agent patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply and validate the agent patch
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          {
            cat .agent/apply.py.gz.b64.* | base64 --decode | gzip --decompress > .agent/apply.py
            sed -i 's/""", count=2)/""", count=3)/' .agent/apply.py
            python .agent/apply.py
            npm ci
            npm run check
          } > agent-run.log 2>&1
          status=$?
          printf '%s\n' "$status" > agent-status.txt
          git diff --binary > agent-output.patch
          exit $status

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-patch-diagnostics
          path: |
            agent-run.log
            agent-status.txt
            agent-output.patch
          if-no-files-found: error

      - name: Commit validated implementation
        if: steps.validate.outcome == 'success'
        shell: bash
        run: |
          rm -rf .agent agent-run.log agent-status.txt agent-output.patch
          rm -f .github/workflows/apply-agent-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add bounded Hypagoal revision"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Report validation failure
        if: steps.validate.outcome == 'failure'
        shell: bash
        run: |
          cat agent-run.log
          exit 1

name: Apply M4 plan

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/m4-vertical-slice-plan'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the planning branch
        uses: actions/checkout@v4
        with:
          ref: agent/m4-vertical-slice-plan

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Apply roadmap changes
        run: python3 scripts/apply-m4-plan.py

      - name: Install locked dependencies
        run: npm ci

      - name: Run repository checks
        run: npm run check

      - name: Commit the plan updates
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/execution-roadmap.md docs/m3-completion-phase-plan.md
          git commit -m "Select M4 and add the vertical-slice roadmap"
          git push origin HEAD:agent/m4-vertical-slice-plan
